name = "image-background-remover"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# 本地开发 / Pages Functions 绑定配置
# 先执行 `npx wrangler d1 create image-background-remover-db`
# 再把返回的 database_id 填到下面。
[[d1_databases]]
binding = "DB"
database_name = "image-background-remover-db"
database_id = "dd022a2a-b14c-4824-9aea-c8f5a6974490"
migrations_dir = "migrations"

# 如需独立的预览库，可取消注释并填入 preview_database_id
# preview_database_id = "<YOUR_PREVIEW_D1_DATABASE_ID>"

[vars]
NODE_VERSION = "20"

# Pages 构建建议：
# Build command: npm run pages:build
# Build output directory: .vercel/output/static
