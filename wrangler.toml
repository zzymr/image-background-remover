name = "image-background-remover"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 构建配置
[build]
command = "npm run build"
cwd = "."
watch_dir = "."

# 环境变量（在 Cloudflare Dashboard 中设置）
# [vars]
# REMOVEBG_API_KEY = "" 

# 生产环境变量
[env.production]
routes = [
  { pattern = "/*", zone_name = "" }
]

# 预览环境变量
[env.preview]
routes = [
  { pattern = "/*", zone_name = "" }
]
